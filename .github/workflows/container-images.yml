name: Container images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: container-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Validate and publish service images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Markdown links
        run: pnpm check:links

      - name: Typecheck packages
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Check built entrypoints
        run: pnpm check:built-entrypoints

      - name: Check built service health
        run: pnpm check:built-health

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image-tags
        shell: bash
        run: |
          set -euo pipefail

          tags=("sha-${GITHUB_SHA}")
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            tags+=("main")
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags+=("${GITHUB_REF_NAME}")
          fi

          printf 'tags=%s\n' "$(IFS=,; echo "${tags[*]}")" >> "$GITHUB_OUTPUT"

      - name: Build and publish service images
        run: pnpm docker:build-services -- --owner "${GITHUB_REPOSITORY_OWNER}" --tag "${{ steps.image-tags.outputs.tags }}" --push
